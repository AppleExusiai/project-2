<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册测试 - 防诈骗平台</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .test-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 8px;
    }
    .test-box {
      background: white;
      padding: 20px;
      margin: 15px 0;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    .test-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #2c3e50;
    }
    .test-result {
      padding: 10px;
      margin: 5px 0;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }
    .test-success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
    }
    .test-error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
    }
    .test-info {
      background: #d1ecf1;
      border: 1px solid #bee5eb;
      color: #0c5460;
    }
    .test-button {
      background: #3498db;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
      font-size: 14px;
    }
    .test-button:hover {
      background: #2980b9;
    }
    .test-button.danger {
      background: #e74c3c;
    }
    .test-button.danger:hover {
      background: #c0392b;
    }
    .form-test {
      background: #ecf0f1;
      padding: 15px;
      border-radius: 4px;
      margin: 10px 0;
    }
    .form-group {
      margin: 10px 0;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #bdc3c7;
      border-radius: 4px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-light">
    <div class="container">
      <div class="logo">
        <span class="logo-icon">🛡️</span>
        <span class="logo-text">防诈骗平台 - 注册测试工具</span>
      </div>
    </div>
  </nav>

  <div class="test-container">
    <h1>🧪 注册功能诊断工具</h1>
    
    <!-- 服务器连接测试 -->
    <div class="test-box">
      <div class="test-title">1. 服务器连接测试</div>
      <button class="test-button" onclick="testServerConnection()">测试服务器连接</button>
      <div id="serverTest"></div>
    </div>

    <!-- API端点测试 -->
    <div class="test-box">
      <div class="test-title">2. API端点测试</div>
      <button class="test-button" onclick="testApiEndpoints()">测试API端点</button>
      <div id="apiTest"></div>
    </div>

    <!-- 表单验证测试 -->
    <div class="test-box">
      <div class="test-title">3. 表单验证测试</div>
      <div class="form-test">
        <div class="form-group">
          <label>用户名（测试用）：</label>
          <input type="text" id="testUsername" placeholder="输入用户名" value="testuser_">
        </div>
        <div class="form-group">
          <label>邮箱（测试用）：</label>
          <input type="email" id="testEmail" placeholder="输入邮箱" value="test@example.com">
        </div>
        <div class="form-group">
          <label>密码（测试用）：</label>
          <input type="password" id="testPassword" placeholder="输入密码" value="password123">
        </div>
        <button class="test-button" onclick="testValidation()">测试表单验证</button>
        <button class="test-button danger" onclick="testRegistration()">尝试注册</button>
      </div>
      <div id="validationTest"></div>
    </div>

    <!-- 数据库状态 -->
    <div class="test-box">
      <div class="test-title">4. 数据库状态</div>
      <button class="test-button" onclick="checkExistingUsers()">查看已存在的用户</button>
      <div id="databaseTest"></div>
    </div>

    <!-- 清除数据 -->
    <div class="test-box">
      <div class="test-title">⚠️ 测试数据管理</div>
      <p>这些操作用于开发和测试。生产环境中请勿使用。</p>
      <button class="test-button danger" onclick="clearTestUsers()">清除所有测试用户</button>
      <div id="clearTest"></div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:3000/api';

    function showResult(elementId, message, type = 'info') {
      const el = document.getElementById(elementId);
      const resultDiv = document.createElement('div');
      resultDiv.className = `test-result test-${type}`;
      resultDiv.textContent = message;
      el.appendChild(resultDiv);
    }

    function clearResults(elementId) {
      document.getElementById(elementId).innerHTML = '';
    }

    async function testServerConnection() {
      clearResults('serverTest');
      try {
        const response = await fetch('http://localhost:3000');
        showResult('serverTest', '✓ 服务器连接成功 (状态: 200)', 'success');
      } catch (error) {
        showResult('serverTest', '✗ 服务器连接失败: ' + error.message, 'error');
      }
    }

    async function testApiEndpoints() {
      clearResults('apiTest');
      try {
        const response = await fetch(`${API_BASE_URL}/auth/check`, {
          credentials: 'include'
        });
        if (response.ok) {
          showResult('apiTest', '✓ API端点可访问', 'success');
        } else {
          showResult('apiTest', '✓ API端点可访问 (需要认证)', 'info');
        }
      } catch (error) {
        showResult('apiTest', '✗ API端点无法访问: ' + error.message, 'error');
      }
    }

    function testValidation() {
      clearResults('validationTest');
      const username = document.getElementById('testUsername').value;
      const email = document.getElementById('testEmail').value;
      const password = document.getElementById('testPassword').value;

      // 用户名验证
      if (!username) {
        showResult('validationTest', '✗ 用户名为空', 'error');
      } else if (username.length < 3 || username.length > 16) {
        showResult('validationTest', '✗ 用户名长度必须在3-16个字符之间', 'error');
      } else if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        showResult('validationTest', '✗ 用户名只能包含字母、数字和下划线', 'error');
      } else {
        showResult('validationTest', '✓ 用户名有效: ' + username, 'success');
      }

      // 邮箱验证
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email) {
        showResult('validationTest', '✗ 邮箱为空', 'error');
      } else if (!emailRegex.test(email)) {
        showResult('validationTest', '✗ 邮箱格式不正确', 'error');
      } else {
        showResult('validationTest', '✓ 邮箱有效: ' + email, 'success');
      }

      // 密码验证
      if (!password) {
        showResult('validationTest', '✗ 密码为空', 'error');
      } else if (password.length < 6) {
        showResult('validationTest', '✗ 密码长度至少为6位', 'error');
      } else {
        showResult('validationTest', '✓ 密码有效（长度: ' + password.length + '位）', 'success');
      }
    }

    async function testRegistration() {
      clearResults('validationTest');
      const username = document.getElementById('testUsername').value;
      const email = document.getElementById('testEmail').value;
      const password = document.getElementById('testPassword').value;

      try {
        const response = await fetch(`${API_BASE_URL}/auth/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify({
            username,
            email,
            password,
            confirmPassword: password
          })
        });

        const data = await response.json();

        if (response.ok) {
          showResult('validationTest', '✓ 注册成功！用户: ' + username, 'success');
        } else {
          showResult('validationTest', '✗ 注册失败: ' + (data.error || '未知错误'), 'error');
        }
      } catch (error) {
        showResult('validationTest', '✗ 请求失败: ' + error.message, 'error');
      }
    }

    async function checkExistingUsers() {
      clearResults('databaseTest');
      try {
        const response = await fetch(`${API_BASE_URL}/auth/check`, {
          credentials: 'include'
        });
        showResult('databaseTest', '✓ 数据库连接成功', 'success');
        showResult('databaseTest', '提示：具体用户列表需要管理后台查看', 'info');
      } catch (error) {
        showResult('databaseTest', '✗ 数据库连接失败: ' + error.message, 'error');
      }
    }

    async function clearTestUsers() {
      if (!confirm('确定要清除所有测试用户吗？此操作无法撤销！')) {
        return;
      }

      clearResults('clearTest');
      try {
        const response = await fetch(`${API_BASE_URL}/admin/clear-test-users`, {
          method: 'POST',
          credentials: 'include'
        });

        if (response.ok) {
          showResult('clearTest', '✓ 测试用户已清除', 'success');
        } else {
          showResult('clearTest', '⚠ 无法清除用户（可能不存在清除端点）', 'info');
        }
      } catch (error) {
        showResult('clearTest', '⚠ 请求失败: ' + error.message, 'info');
      }
    }

    // 页面加载时运行初始检查
    window.addEventListener('DOMContentLoaded', () => {
      testServerConnection();
      testApiEndpoints();
    });
  </script>
</body>
</html>
